<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#147EBA"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="980" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#232F3E">Project A: Zero-Trust Three-Tier AWS Web App</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#666">High-Level Architecture · Defense in Depth</text>

  <!-- Internet/User -->
  <circle cx="600" cy="100" r="22" fill="#555" stroke="#222" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" font-size="11" fill="white" font-weight="bold">User</text>
  <text x="600" y="142" text-anchor="middle" font-size="11" fill="#666" font-style="italic">HTTPS (TLS 1.3) via ACM cert</text>
  <line x1="600" y1="148" x2="600" y2="172" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- WAF -->
  <rect x="475" y="175" width="250" height="50" fill="#DD344C" rx="6"/>
  <text x="600" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AWS WAF</text>
  <text x="600" y="216" text-anchor="middle" font-size="10" fill="white">Managed rules · SQLi · XSS · Rate limit (100/5min/IP)</text>
  <line x1="600" y1="225" x2="600" y2="255" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AWS Account container -->
  <rect x="40" y="265" width="930" height="640" fill="none" stroke="#232F3E" stroke-width="2" stroke-dasharray="8,4" rx="8"/>
  <text x="55" y="288" font-size="13" font-weight="bold" fill="#232F3E">AWS Account · Region: us-east-1</text>

  <!-- VPC container -->
  <rect x="70" y="305" width="700" height="585" fill="#EAF4FB" stroke="#147EBA" stroke-width="2" rx="6"/>
  <text x="85" y="328" font-size="13" font-weight="bold" fill="#147EBA">VPC (10.0.0.0/16) · 3 Availability Zones</text>

  <!-- AZ labels -->
  <text x="200" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">AZ-a</text>
  <text x="420" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">AZ-b</text>
  <text x="640" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">AZ-c</text>

  <!-- Public Subnet Row -->
  <rect x="90" y="370" width="660" height="120" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" rx="4"/>
  <text x="100" y="388" font-size="11" font-weight="bold" fill="#2E7D32">PUBLIC SUBNETS</text>

  <!-- ALB spanning all 3 AZs -->
  <rect x="120" y="400" width="600" height="40" fill="#FF9900" rx="4"/>
  <text x="420" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Application Load Balancer (multi-AZ)</text>

  <!-- NAT Gateway -->
  <rect x="600" y="450" width="120" height="30" fill="#FF9900" rx="3"/>
  <text x="660" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NAT Gateway</text>

  <!-- Private Subnet Row -->
  <rect x="90" y="510" width="660" height="120" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5" rx="4"/>
  <text x="100" y="528" font-size="11" font-weight="bold" fill="#E65100">PRIVATE SUBNETS · App Tier</text>

  <!-- EC2 instances in 3 AZs -->
  <rect x="160" y="545" width="80" height="60" fill="#FF9900" rx="4"/>
  <text x="200" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="white">EC2</text>
  <text x="200" y="588" text-anchor="middle" font-size="9" fill="white">t4g.micro</text>
  <text x="200" y="600" text-anchor="middle" font-size="9" fill="white">App</text>

  <rect x="380" y="545" width="80" height="60" fill="#FF9900" rx="4"/>
  <text x="420" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="white">EC2</text>
  <text x="420" y="588" text-anchor="middle" font-size="9" fill="white">t4g.micro</text>
  <text x="420" y="600" text-anchor="middle" font-size="9" fill="white">App</text>

  <rect x="600" y="545" width="80" height="60" fill="#FF9900" rx="4"/>
  <text x="640" y="572" text-anchor="middle" font-size="11" font-weight="bold" fill="white">EC2</text>
  <text x="640" y="588" text-anchor="middle" font-size="9" fill="white">t4g.micro</text>
  <text x="640" y="600" text-anchor="middle" font-size="9" fill="white">App</text>

  <text x="420" y="620" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Auto Scaling Group · No public IPs</text>

  <!-- Isolated Subnet Row -->
  <rect x="90" y="650" width="660" height="120" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5" rx="4"/>
  <text x="100" y="668" font-size="11" font-weight="bold" fill="#B71C1C">ISOLATED SUBNETS · Data Tier · NO INTERNET ROUTE</text>

  <!-- Aurora cluster -->
  <rect x="280" y="685" width="280" height="60" fill="#3B48CC" rx="4"/>
  <text x="420" y="710" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Aurora Serverless v2</text>
  <text x="420" y="728" text-anchor="middle" font-size="10" fill="white">Encrypted at rest · Auto-pause when idle</text>

  <!-- VPC Endpoints -->
  <rect x="90" y="790" width="660" height="80" fill="#F5F5F5" stroke="#999" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
  <text x="100" y="808" font-size="11" font-weight="bold" fill="#555">VPC ENDPOINTS · Traffic stays off public internet</text>
  <rect x="110" y="820" width="100" height="35" fill="#147EBA" rx="3"/>
  <text x="160" y="843" text-anchor="middle" font-size="10" fill="white" font-weight="bold">S3 (Gateway)</text>
  <rect x="220" y="820" width="120" height="35" fill="#147EBA" rx="3"/>
  <text x="280" y="843" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Secrets Manager</text>
  <rect x="350" y="820" width="80" height="35" fill="#147EBA" rx="3"/>
  <text x="390" y="843" text-anchor="middle" font-size="10" fill="white" font-weight="bold">KMS</text>
  <rect x="440" y="820" width="80" height="35" fill="#147EBA" rx="3"/>
  <text x="480" y="843" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SSM</text>
  <rect x="530" y="820" width="120" height="35" fill="#147EBA" rx="3"/>
  <text x="590" y="843" text-anchor="middle" font-size="10" fill="white" font-weight="bold">DynamoDB (GW)</text>

  <!-- Flow arrows: ALB to EC2 -->
  <line x1="200" y1="445" x2="200" y2="540" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="420" y1="445" x2="420" y2="540" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="445" x2="640" y2="540" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Flow arrows: EC2 to Aurora -->
  <line x1="200" y1="610" x2="350" y2="685" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="420" y1="610" x2="420" y2="685" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="610" x2="490" y2="685" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Side panel: Security Services -->
  <rect x="790" y="305" width="170" height="285" fill="white" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="875" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">SECURITY SERVICES</text>

  <rect x="805" y="340" width="140" height="35" fill="#D13212" rx="3"/>
  <text x="875" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="white">IAM</text>
  <text x="875" y="385" text-anchor="middle" font-size="9" fill="#666">Least privilege · Access Analyzer</text>

  <rect x="805" y="400" width="140" height="35" fill="#D13212" rx="3"/>
  <text x="875" y="422" text-anchor="middle" font-size="11" font-weight="bold" fill="white">KMS</text>
  <text x="875" y="445" text-anchor="middle" font-size="9" fill="#666">3 CMKs · Key rotation enabled</text>

  <rect x="805" y="460" width="140" height="35" fill="#D13212" rx="3"/>
  <text x="875" y="482" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Secrets Manager</text>
  <text x="875" y="505" text-anchor="middle" font-size="9" fill="#666">30-day rotation via Lambda</text>

  <rect x="805" y="520" width="140" height="35" fill="#D13212" rx="3"/>
  <text x="875" y="542" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ACM</text>
  <text x="875" y="565" text-anchor="middle" font-size="9" fill="#666">TLS 1.3 certificate (free)</text>

  <!-- Side panel: Observability -->
  <rect x="790" y="610" width="170" height="280" fill="white" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="875" y="630" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">OBSERVABILITY</text>

  <rect x="805" y="645" width="140" height="35" fill="#7AA116" rx="3"/>
  <text x="875" y="667" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CloudTrail</text>

  <rect x="805" y="690" width="140" height="35" fill="#7AA116" rx="3"/>
  <text x="875" y="712" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CloudWatch</text>
  <text x="875" y="733" text-anchor="middle" font-size="9" fill="#666">Dashboard + alarms</text>

  <rect x="805" y="745" width="140" height="35" fill="#7AA116" rx="3"/>
  <text x="875" y="767" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AWS Config</text>
  <text x="875" y="788" text-anchor="middle" font-size="9" fill="#666">CIS Benchmark pack</text>

  <rect x="805" y="800" width="140" height="35" fill="#7AA116" rx="3"/>
  <text x="875" y="822" text-anchor="middle" font-size="11" font-weight="bold" fill="white">VPC Flow Logs</text>

  <rect x="805" y="845" width="140" height="35" fill="#7AA116" rx="3"/>
  <text x="875" y="867" text-anchor="middle" font-size="11" font-weight="bold" fill="white">SNS</text>
  <text x="875" y="884" text-anchor="middle" font-size="9" fill="#666">Email alerts</text>

  <!-- CI/CD Panel -->
  <rect x="990" y="305" width="180" height="200" fill="white" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="1080" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">CI/CD PIPELINE</text>

  <rect x="1005" y="340" width="150" height="35" fill="#24292E" rx="3"/>
  <text x="1080" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="white">GitHub Actions</text>
  <text x="1080" y="385" text-anchor="middle" font-size="9" fill="#666">OIDC federation</text>
  <text x="1080" y="397" text-anchor="middle" font-size="9" fill="#666">(no long-lived keys)</text>

  <rect x="1005" y="410" width="150" height="30" fill="#5C2D91" rx="3"/>
  <text x="1080" y="430" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Terraform plan/apply</text>

  <rect x="1005" y="450" width="70" height="30" fill="#FF6B35" rx="3"/>
  <text x="1040" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Checkov</text>

  <rect x="1085" y="450" width="70" height="30" fill="#FF6B35" rx="3"/>
  <text x="1120" y="470" text-anchor="middle" font-size="10" font-weight="bold" fill="white">tfsec</text>

  <text x="1080" y="495" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Block insecure merges</text>

  <!-- Compliance Panel -->
  <rect x="990" y="525" width="180" height="180" fill="white" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="1080" y="545" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">COMPLIANCE</text>

  <rect x="1005" y="560" width="150" height="35" fill="#3B48CC" rx="3"/>
  <text x="1080" y="582" text-anchor="middle" font-size="11" font-weight="bold" fill="white">NIST CSF 2.0</text>
  <text x="1080" y="603" text-anchor="middle" font-size="9" fill="#666">All 6 functions mapped</text>

  <rect x="1005" y="620" width="150" height="35" fill="#3B48CC" rx="3"/>
  <text x="1080" y="642" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CIS AWS Foundations</text>
  <text x="1080" y="663" text-anchor="middle" font-size="9" fill="#666">Target: 90%+ pass</text>

  <rect x="1005" y="675" width="150" height="20" fill="#666" rx="3"/>
  <text x="1080" y="690" text-anchor="middle" font-size="10" fill="white">STRIDE Threat Model</text>

  <!-- Legend -->
  <rect x="990" y="725" width="180" height="165" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="6"/>
  <text x="1080" y="745" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">LEGEND</text>

  <rect x="1005" y="755" width="20" height="15" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="1032" y="767" font-size="10" fill="#333">Public subnet</text>

  <rect x="1005" y="775" width="20" height="15" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="1032" y="787" font-size="10" fill="#333">Private subnet</text>

  <rect x="1005" y="795" width="20" height="15" fill="#FFEBEE" stroke="#E53935"/>
  <text x="1032" y="807" font-size="10" fill="#333">Isolated subnet</text>

  <line x1="1005" y1="820" x2="1025" y2="820" stroke="#147EBA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="1032" y="824" font-size="10" fill="#333">Data flow</text>

  <line x1="1005" y1="840" x2="1025" y2="840" stroke="#232F3E" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="1032" y="844" font-size="10" fill="#333">Trust boundary</text>

  <rect x="1005" y="855" width="20" height="15" fill="#FF9900"/>
  <text x="1032" y="867" font-size="10" fill="#333">AWS service</text>

  <!-- Footer -->
  <text x="600" y="945" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Built with Terraform · 8-week build · Monitored by Project B (Threat Detection Pipeline)</text>
  <text x="600" y="962" text-anchor="middle" font-size="10" fill="#999">github.com/YOURNAME/zero-trust-aws-app</text>
</svg>
